<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#1A1A1A"/>
  <rect x="10" y="10" width="80" height="80" rx="15" fill="#FFD700"/>
  <g fill="#1A1A1A">
    <!-- Taxi body -->
    <rect x="20" y="35" width="60" height="30" rx="5"/>
    <!-- Roof light -->
    <rect x="40" y="25" width="20" height="10" rx="3"/>
    <!-- Windows -->
    <rect x="25" y="40" width="15" height="12" rx="2" fill="#87CEEB"/>
    <rect x="60" y="40" width="15" height="12" rx="2" fill="#87CEEB"/>
    <!-- Wheels -->
    <circle cx="30" cy="70" r="8"/>
    <circle cx="70" cy="70" r="8"/>
    <!-- Taxi sign -->
    <rect x="42" y="28" width="16" height="4" rx="1" fill="#1A1A1A"/>
  </g>
</svg>
